<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fate_system Links</title>
    <style>
        /* RESET & BASE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Pure white background with a precise grey dot matrix grid using CSS radial gradients */
            background-color: #ffffff;
            background-image: radial-gradient(#d3d3d3 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* CONTAINER */
        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            padding: 40px 30px;
            background: #ffffff;
            /* Subtle crisp shadow to cleanly separate the card from the dot grid */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid #eaeaea;
        }

        /* PROFILE SECTION */
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #8134AF; /* Purple accent border */
            margin-bottom: 20px;
        }

        .username {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .bio {
            font-size: 0.95rem;
            color: #666666;
            margin-bottom: 35px;
            line-height: 1.4;
        }

        /* LINKS */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            display: block;
            padding: 16px;
            text-decoration: none;
            font-weight: 700;
            border-radius: 0px; /* Sharp rectangle buttons */
            transition: all 0.2s ease-in-out;
            text-transform: uppercase;
            font-size: 0.95rem;
            letter-spacing: 1.5px;
        }

        /* CUSTOM BRAND COLORS */
        .instagram {
            /* Rich, deep royal purple gradient */
            background: linear-gradient(45deg, #405DE6, #5851DB, #833AB4, #C13584);
            color: #ffffff;
        }

        .itch {
            background-color: #fa5c5c;
            color: #ffffff;
        }

        .discord {
            background-color: #5865F2;
            color: #ffffff;
        }

        .youtube {
            /* True solid brand red */
            background-color: #FF0000;
            color: #ffffff;
        }

        /* HOVER EFFECTS (Sharp, snappy lift) */
        .link-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
            filter: brightness(1.1);
        }

        /* FOOTER */
        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #999999;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="profile.jpg" alt="Profile Picture" class="profile-img">
        <h1 class="username">Fate_System</h1>
        <p class="bio">Fate_System links below</p>

        <div class="links-wrapper">
            <a href="https://www.instagram.com/fate_system/" target="_blank" class="link-card instagram">Instagram</a>
            <a href="https://fate-system.itch.io/" target="_blank" class="link-card itch">Itch.io</a>
            <a href="https://discord.gg/uQXaxHmcR" target="_blank" class="link-card discord">Discord Server</a>
            <a href="https://www.youtube.com/@Fate-System" target="_blank" class="link-card youtube">YouTube</a>
        </div>

        <div class="footer">
            <p>© 2026 FATE_SYSTEM</p>
        </div>
    </div>

</body>
</html>
